# Unicodex Rust SDK -- CI Pipeline
# Unicodex Rust SDK -- CI 持续集成流水线
#
# NOTE: This SDK is a facade crate that depends on sibling ucx-* workspace
# crates via path references. Build/test/clippy require the full Unicodex
# workspace and cannot run in this standalone repo. Only format checking
# is possible here. Full CI runs in the parent Unicodex workspace.
#
# 注意：本 SDK 是 facade crate，通过路径引用依赖父 workspace 的 ucx-* crate。
# 构建/测试/clippy 需要完整的 Unicodex workspace，无法在独立仓库中运行。
# 此处仅执行格式检查。完整 CI 在父仓库 Unicodex workspace 中运行。

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------
  # Fmt -- verify code formatting (the only check possible
  # without the parent workspace).
  # Fmt -- 验证代码格式（独立仓库中唯一可执行的检查）。
  # -----------------------------------------------------------
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cargo fmt check
        run: cargo fmt --all -- --check
